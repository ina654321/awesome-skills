# PR Skill Check - Automated review for skill changes
# Adds quality check comments to PRs that modify skills

name: PR Skill Review

on:
  pull_request:
    paths:
      - 'skills/**/SKILL.md'

jobs:
  review-skill-changes:
    name: Review Skill Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyyaml rich
      
      - name: Analyze changed skills
        id: analyze
        run: |
          python3 << PYTHON_EOF
          import subprocess
          import sys
          sys.path.insert(0, 'tools')
          from skill_analyzer import scorer
          from pathlib import Path
          import json
          
          # Get changed files
          result = subprocess.run(
              ['git', 'diff', '--name-only', 'origin/${{ github.base_ref }}...HEAD'],
              capture_output=True, text=True
          )
          changed_files = [f for f in result.stdout.strip().split('\n') if f.endswith('SKILL.md')]
          
          if not changed_files:
              print("No skill files changed")
              exit(0)
          
          results = []
          for f in changed_files:
              try:
                  result = scorer.score_skill(Path(f))
                  results.append(result)
              except Exception as e:
                  results.append({
                      'path': f,
                      'error': str(e)
                  })
          
          # Save results
          with open('pr_analysis.json', 'w') as f:
              json.dump(results, f, indent=2)
          
          # Generate summary
          valid = [r for r in results if 'error' not in r]
          if valid:
              avg = sum(r['weighted_avg'] for r in valid) / len(valid)
              print(f"Average score: {avg:.2f}")
              
              # Check for low scores
              low_scores = [r for r in valid if r['weighted_avg'] < 5.0]
              if low_scores:
                  print(f"::warning::{len(low_scores)} skill(s) scored below 5.0")
          PYTHON_EOF
      
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            try {
              const results = JSON.parse(fs.readFileSync('pr_analysis.json', 'utf8'));
              
              let comment = '## 🎯 Skill Quality Check Results\n\n';
              comment += '| Skill | Score | Tier | Status |\n';
              comment += '|-------|-------|------|--------|\n';
              
              for (const r of results) {
                if (r.error) {
                  comment += `| ${r.path} | Error | - | ❌ |\n`;
                } else {
                  const score = r.weighted_avg.toFixed(2);
                  const tier = r.tier;
                  const status = r.weighted_avg >= 5.0 ? '✅' : '⚠️';
                  comment += `| ${r.skill} | ${score}/10 | ${tier} | ${status} |\n`;
                }
              }
              
              comment += '\n### Details\n\n';
              
              for (const r of results) {
                if (!r.error) {
                  comment += `<details>\n<summary><b>${r.skill}</b> - ${r.weighted_avg.toFixed(2)}/10</summary>\n\n`;
                  comment += '| Dimension | Score |\n';
                  comment += '|-----------|-------|\n';
                  for (const [dim, score] of Object.entries(r.scores)) {
                    comment += `| ${dim} | ${score}/10 |\n`;
                  }
                  
                  if (r.gaps && r.gaps.length > 0) {
                    comment += '\n**Improvement Areas:**\n';
                    for (const gap of r.gaps.slice(0, 3)) {
                      comment += `- ${gap.dimension}: ${gap.suggestion}\n`;
                    }
                  }
                  
                  comment += '</details>\n\n';
                }
              }
              
              comment += '\n---\n*Automated by Skill Quality Gate*';
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              
            } catch (e) {
              console.log('Error posting comment:', e.message);
            }
      
      - name: Check quality threshold
        run: |
          python3 << PYTHON_EOF
          import json
          import sys
          
          with open('pr_analysis.json') as f:
              results = json.load(f)
          
          valid = [r for r in results if 'error' not in r]
          low_scores = [r for r in valid if r['weighted_avg'] < 4.0]
          
          if low_scores:
              print("\n❌ Quality check FAILED")
              for r in low_scores:
                  print(f"  - {r['skill']}: {r['weighted_avg']:.2f}/10 (below 4.0)")
              sys.exit(1)
          else:
              print("\n✅ Quality check PASSED")
          PYTHON_EOF
