# GitHub Pages Deployment
# Deploys the website and evaluation reports to GitHub Pages

name: Deploy to GitHub Pages

on:
  # Runs after comprehensive evaluation
  workflow_run:
    workflows: ["Comprehensive Skill Evaluation"]
    types:
      - completed
  # Manual trigger
  workflow_dispatch:
  # Push to main
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    name: Build Pages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Generate skills data
        run: |
          echo "🔍 Generating skills data for website..."
          python3 scripts/generate_skills_data.py
          echo "✅ Skills data generated"
      
      - name: Check for evaluation reports
        run: |
          if [ -f "reports/evaluation_report.html" ]; then
            echo "✅ Evaluation report found"
          else
            echo "⚠️ Evaluation report not found, will use placeholder"
            mkdir -p reports
            echo '<!DOCTYPE html><html><head><title>Evaluation Report</title></head><body><h1>Report Not Available</h1><p>Please run the Comprehensive Skill Evaluation workflow first.</p></body></html>' > reports/evaluation_report.html
          fi
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  # Deploy job
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Print deployment URL
        run: |
          echo "✅ GitHub Pages deployed successfully!"
          echo "🌐 Website URL: ${{ steps.deployment.outputs.page_url }}"
          echo "📊 Report URL: ${{ steps.deployment.outputs.page_url }}reports/evaluation_report.html"
