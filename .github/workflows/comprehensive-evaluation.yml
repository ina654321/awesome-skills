# Comprehensive Skill Evaluation - 3-Step Pipeline
# Step 1: Evaluate & Generate Report
# Step 2: Update GitHub Pages
# Step 3: Update README & Project Config

name: Comprehensive Skill Evaluation

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.github/workflows/comprehensive-evaluation.yml'
      - 'scripts/comprehensive_skill_evaluation.py'
      - 'scripts/generate_skills_data.py'
      - 'scripts/update_category_filters.py'
      - 'scripts/update_project_files.py'

jobs:
  # ============================================================================
  # STEP 1: Evaluate Skills & Generate Report
  # ============================================================================
  step1-evaluate:
    name: "Step 1: Evaluate & Generate Report"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml rich
      
      - name: Run comprehensive evaluation
        id: evaluate
        run: |
          echo "Starting comprehensive skill evaluation..."
          python3 scripts/comprehensive_skill_evaluation.py \
            --output reports/evaluation_report.json \
            --format both
          echo "Evaluation complete"
      
      - name: Generate skills data for website
        run: |
          echo "Generating skills data..."
          python3 scripts/generate_skills_data.py
          echo "Skills data generated"
      
      - name: Display evaluation summary
        run: python3 scripts/display_evaluation_summary.py
      
      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: |
            reports/evaluation_report.json
            reports/evaluation_report.html
            assets/js/skills-data.js
          retention-days: 30

  # ============================================================================
  # STEP 2: Update GitHub Pages
  # ============================================================================
  step2-update-pages:
    name: "Step 2: Update GitHub Pages"
    runs-on: ubuntu-latest
    needs: step1-evaluate
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: evaluation-report
          path: .
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  # ============================================================================
  # STEP 3: Update README & Project Config  
  # ============================================================================
  step3-update-config:
    name: "Step 3: Update README & Project Config"
    runs-on: ubuntu-latest
    needs: [step1-evaluate, step2-update-pages]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: evaluation-report
          path: .
      
      - name: Update README and index.html
        run: python3 scripts/update_project_files.py
      
      - name: Update category filters
        run: |
          echo "Updating category filters..."
          python3 scripts/update_category_filters.py
          echo "Category filters updated"
      
      - name: Commit and push updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md index.html assets/js/ reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update project stats and config [ci skip]"
            git push
            echo "README and project config updated"
          fi
