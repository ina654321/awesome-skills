# Daily Optimization Scan - Continuous Improvement Pipeline
# Runs daily to identify and report skills needing optimization

name: Daily Optimization Scan

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

jobs:
  scan-and-report:
    name: Scan Skills and Generate Reports
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml rich
      
      - name: Run full skill analysis
        run: python3 scripts/batch_optimize_skills.py --analyze --output reports/daily_analysis.json
      
      - name: Generate optimization recommendations
        run: python3 scripts/continuous_optimization.py --suggest --priority 5
      
      - name: Generate Markdown report
        run: python3 scripts/generate_markdown_report.py
      
      - name: Create issue for high priority items
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('reports/optimization_recommendations.json', 'utf8'));
            
            const highPriority = report.skills.filter(r => r.priority >= 6);
            
            if (highPriority.length > 0) {
              const items = highPriority.map(r => `- **P${r.priority}**: \`${r.skill}\` (Score: ${r.current_score.toFixed(2)}/10)`).join('\n');
              const issueBody = `## 🚨 High Priority Skill Optimization Required\n\n${items}\n\n### Next Steps\n1. Review skills with P6+ priority\n2. Assign to team members\n3. Track progress in project board\n\n*Auto-generated by Daily Optimization Scan*`;
              
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Auto] ${highPriority.length} skills need immediate optimization`,
                body: issueBody,
                labels: ['optimization', 'automated', 'high-priority']
              });
            }
      
      - name: Commit reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily optimization scan [ci skip]"
          git push
