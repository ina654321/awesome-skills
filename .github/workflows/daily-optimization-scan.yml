# Daily Optimization Scan - Continuous Improvement Pipeline
# Runs daily to identify and report skills needing optimization

name: Daily Optimization Scan

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC daily
  workflow_dispatch:

jobs:
  scan-and-report:
    name: Scan Skills and Generate Reports
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyyaml rich
      
      - name: Run full skill analysis
        run: |
          python3 scripts/batch_optimize_skills.py \
            --analyze \
            --output reports/daily_analysis.json
      
      - name: Generate optimization recommendations
        run: |
          python3 << PYTHON_EOF
          import json
          from datetime import datetime
          
          # Load analysis results
          with open('reports/daily_analysis.json') as f:
              data = json.load(f)
          
          skills = data['skills']
          
          # Identify skills needing optimization
          needs_opt = [s for s in skills if s.get('needs_optimization', False)]
          needs_opt.sort(key=lambda x: x.get('priority', 0), reverse=True)
          
          # Generate report
          report = {
              'generated_at': datetime.now().isoformat(),
              'summary': {
                  'total_skills': len(skills),
                  'needs_optimization': len(needs_opt),
                  'high_priority': len([s for s in needs_opt if s.get('priority', 0) >= 5]),
              },
              'priority_breakdown': {},
              'recommendations': []
          }
          
          # Priority breakdown
          for p in range(7, 0, -1):
              count = len([s for s in needs_opt if s.get('priority', 0) == p])
              if count > 0:
                  report['priority_breakdown'][f'P{p}'] = count
          
          # Top recommendations
          for s in needs_opt[:20]:
              score = s.get('score', {})
              report['recommendations'].append({
                  'path': s['path'],
                  'category': s['category'],
                  'priority': s.get('priority', 0),
                  'current_score': score.get('weighted_avg', 0),
                  'tier': score.get('tier', 'unknown'),
                  'gaps': [g['dimension'] for g in score.get('gaps', [])]
              })
          
          # Save report
          with open('reports/optimization_recommendations.json', 'w') as f:
              json.dump(report, f, indent=2)
          
          # Generate Markdown summary
          md_content = f"""# Daily Optimization Report

Generated: {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}

## Summary

| Metric | Count |
|--------|-------|
| Total Skills | {report['summary']['total_skills']} |
| Need Optimization | {report['summary']['needs_optimization']} |
| High Priority (P5+) | {report['summary']['high_priority']} |

## Priority Breakdown

| Priority | Count |
|----------|-------|
"""
          
          for p, count in sorted(report['priority_breakdown'].items(), reverse=True):
              md_content += f"| {p} | {count} |\n"
          
          md_content += """
## Top 20 Recommendations

| Priority | Skill | Score | Tier | Gaps |
|----------|-------|-------|------|------|
"""
          
          for rec in report['recommendations']:
              gaps_str = ', '.join(rec['gaps'][:3])
              md_content += f"| P{rec['priority']} | {rec['path']} | {rec['current_score']:.2f} | {rec['tier']} | {gaps_str} |\n"
          
          md_content += """
## Action Items

1. **P7 Skills**: Immediate attention required
2. **P6 Skills**: Schedule for this week
3. **P5 Skills**: Schedule for this sprint
4. **P3-P4 Skills**: Backlog for next month

---
*This report is auto-generated daily. To regenerate manually, run the "Daily Optimization Scan" workflow.*
"""
          
          with open('reports/OPTIMIZATION_REPORT.md', 'w') as f:
              f.write(md_content)
          
          print(f"Report generated: {len(needs_opt)} skills need optimization")
          PYTHON_EOF
      
      - name: Create issue for high priority items
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('reports/optimization_recommendations.json', 'utf8'));
            
            const highPriority = report.recommendations.filter(r => r.priority >= 6);
            
            if (highPriority.length > 0) {
              const issueBody = `## 🚨 High Priority Skill Optimization Required
            
${highPriority.map(r => `- **P${r.priority}**: \`${r.path}\` (Score: ${r.current_score.toFixed(2)}/10)`).join('\n')}

### Next Steps
1. Review skills with P6+ priority
2. Assign to team members
3. Track progress in project board

*Auto-generated by Daily Optimization Scan*`;
              
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Auto] ${highPriority.length} skills need immediate optimization`,
                body: issueBody,
                labels: ['optimization', 'automated', 'high-priority']
              });
            }
      
      - name: Commit reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/
          git diff --quiet && git diff --staged --quiet || git commit -m "Daily optimization scan [ci skip]"
          git push
